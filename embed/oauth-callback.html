<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Signing in…</title></head>
<body>
<script>
  // ArcGIS Maps SDK OAuth popup callback (standard Esri pattern)
  if (window.opener && window.opener.require) {
    window.opener.require(["esri/identity/IdentityManager"], function (esriId) {
      esriId.setOAuthResponseHash(window.location.hash);
      window.close();
    });
  }
</script>
</body>
</html>
